<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Uninstall Feedback | Munjez</title>
<meta name="description" content="Tell us why you uninstalled Munjez so we can improve."/>
<link rel="icon" type="image/png" href="../screenshots/icon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#070c18;--surface:#0c1223;--card:#101827;--border:#1a2d4a;
  --primary:#7c3aed;--primary-h:#6d28d9;--text:#e2e8f0;--muted:#93a3ba;--accent:#a78bfa;
}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  color:var(--text);line-height:1.6;
  background:
    radial-gradient(ellipse 75% 45% at 50% -20%,rgba(124,58,237,.2),transparent 70%),
    var(--bg);
}
.top{
  position:sticky;top:0;z-index:20;background:rgba(7,12,24,.86);
  backdrop-filter:blur(16px);border-bottom:1px solid rgba(26,45,74,.8);
}
.top-in{
  max-width:960px;margin:0 auto;padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text);font-weight:800}
.brand img{width:30px;height:30px;border-radius:8px}
.back{
  text-decoration:none;background:var(--primary);border:1px solid var(--primary);
  color:#fff;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;transition:.2s;
}
.back:hover{background:var(--primary-h);border-color:var(--primary-h)}
.wrap{max-width:960px;margin:0 auto;padding:34px 20px 72px}
.hero h1{font-size:clamp(34px,5vw,52px);line-height:1.06;letter-spacing:-1.2px}
.hero p{margin-top:10px;color:var(--muted)}
.card{
  margin-top:22px;background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:24px;
}
.row{margin-top:16px}
.row:first-child{margin-top:0}
label{display:block;font-size:13px;font-weight:600;margin-bottom:8px}
input,textarea,select{
  width:100%;border:1px solid var(--border);background:rgba(12,18,35,.85);color:var(--text);
  border-radius:10px;padding:11px 12px;font:inherit;
}
textarea{min-height:130px;resize:vertical}
.checks{display:grid;gap:9px}
.check{
  display:flex;align-items:flex-start;gap:10px;padding:10px 12px;
  border:1px solid var(--border);border-radius:10px;background:rgba(124,58,237,.06);
}
.check input{width:auto;margin-top:2px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;min-height:46px;
  padding:0 16px;border-radius:10px;border:1px solid var(--border);
  text-decoration:none;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;
}
.btn.main{background:var(--primary);border-color:var(--primary);color:#fff}
.btn.main:hover{background:var(--primary-h);border-color:var(--primary-h)}
.btn.alt{background:rgba(124,58,237,.08);color:var(--text)}
.btn.alt:hover{background:rgba(124,58,237,.16);border-color:rgba(124,58,237,.5)}
.note{margin-top:12px;font-size:12.5px;color:var(--muted)}
.done{display:none;margin-top:14px;color:#86efac;font-size:14px}
.done.on{display:block}
@media(max-width:640px){.card{padding:18px}}
</style>
</head>
<body>
  <header class="top">
    <div class="top-in">
      <a class="brand" href="../index.html">
        <img src="../screenshots/icon.png" alt="Munjez"/>
        <span>Munjez</span>
      </a>
      <a class="back" href="../index.html">Back to home</a>
    </div>
  </header>

  <main class="wrap">
    <section class="hero">
      <h1>Uninstall Feedback</h1>
      <p>We're sorry to see you go. Your feedback helps us improve Munjez for future versions.</p>
    </section>

    <section class="card">
      <form id="feedbackForm">
        <div class="row">
          <label for="reason">Main reason for uninstalling</label>
          <select id="reason" required>
            <option value="">Select a reason</option>
            <option value="bugs">Too many bugs</option>
            <option value="missing-features">Missing features</option>
            <option value="performance">Performance issues</option>
            <option value="ui">UI/UX not suitable</option>
            <option value="switching">Switching to another app</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="row">
          <label>What could make you come back?</label>
          <div class="checks">
            <label class="check"><input type="checkbox" value="faster-app"/><span>Better performance and lower memory usage</span></label>
            <label class="check"><input type="checkbox" value="sync"/><span>Cloud sync / backup options</span></label>
            <label class="check"><input type="checkbox" value="mobile"/><span>Mobile companion app</span></label>
            <label class="check"><input type="checkbox" value="features"/><span>More productivity features</span></label>
          </div>
        </div>

        <div class="row">
          <label for="details">Additional details</label>
          <textarea id="details" placeholder="Tell us what happened, what was missing, or what we should improve."></textarea>
        </div>

        <div class="row">
          <label for="email">Email (optional)</label>
          <input id="email" type="email" placeholder="you@example.com"/>
        </div>

        <div class="actions">
          <button class="btn main" type="submit">Send feedback</button>
          <a class="btn alt" href="mailto:munjez.support@proton.me">Email directly</a>
        </div>
        <p class="note">This form opens your email client and prepares the message to: munjez.support@proton.me</p>
        <p id="done" class="done">Thanks for your feedback. We appreciate your time.</p>
      </form>
    </section>
  </main>

<script>
(function(){
  var form=document.getElementById('feedbackForm');
  var done=document.getElementById('done');

  form.addEventListener('submit',function(e){
    e.preventDefault();
    var reason=document.getElementById('reason').value;
    var details=document.getElementById('details').value.trim();
    var email=document.getElementById('email').value.trim();
    var selected=[].slice.call(document.querySelectorAll('.check input:checked')).map(function(i){return i.value;});

    if(!reason)return;

    var subject='Munjez Uninstall Feedback';
    var body=[
      'Reason: '+reason,
      'Come back if: '+(selected.length?selected.join(', '):'Not specified'),
      'Details: '+(details||'N/A'),
      'User email: '+(email||'N/A')
    ].join('\n');

    var mailto='mailto:munjez.support@proton.me?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(body);
    window.location.href=mailto;
    done.classList.add('on');
  });
})();
</script>
</body>
</html>
